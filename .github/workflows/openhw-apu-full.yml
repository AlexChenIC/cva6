# OpenHW Full APU Test Suite
# Comprehensive Verilator regression tests for CVA6 APU configurations
#
# Test coverage (all Verilator-compatible suites used by this workflow):
#
#   RV64 configs:
#     - cv64a6_imafdc_sv39             (base)
#     - cv64a6_imafdc_sv39_hpdcache    (HPDcache)
#     - cv64a6_imafdc_sv39_hpdcache_wb (HPDcache + Write-back)
#     - cv64a6_imafdc_sv39_wb          (Write-back)
#
#   RV64 test suites per config:
#     - smoke-tests          : Quick sanity check (~6 tests) [sv39 only]
#     - dv-riscv-arch-test   : RISC-V architecture compliance (~221 tests)
#     - dv-riscv-tests       : Standard RISC-V tests, p+v mode (~229 tests)
#     - dv-riscv-compliance  : RISC-V compliance suite (~183 tests)
#     - cv64a6_imafdc_tests  : CVA6-specific directed tests (~6 tests)
#     - benchmark            : Performance benchmarks (~12 programs)
#
#   RV32 (cv32a65x):
#     - smoke-tests          : Quick sanity check (~1 test)
#     - dv-riscv-arch-test   : RISC-V architecture compliance (~105 tests)
#     - dv-riscv-tests       : Standard RISC-V tests, p-mode only (~94 tests)
#     - dv-riscv-compliance  : RISC-V compliance suite (~183 tests)
#     - cv32a6_tests         : CVA6-specific directed tests (~6 tests)
#     - dv-riscv-csr-access-test : CSR access verification tests (~9 tests)
#     - dv-csr-embedded-tests: Embedded CSR tests (~5 tests)
#     - benchmark            : Performance benchmarks (~12 programs)
#     - hwconfig_tests       : hwconfig toolchain sanity
#     - coremark             : coremark-on-hwconfig benchmark [veri-testharness only]
#
#   RV32 (cv32a6_imac_sv32):
#     - smoke-tests          : Quick sanity check (~4 tests)
#     - dv-riscv-mmu-sv32-test : SV32 MMU page table tests (~60 tests)
#     - dv-riscv-tests       : Standard RISC-V tests, p+v mode (~173 tests)
#     - dv-riscv-compliance  : RISC-V compliance suite (~183 tests)
#     - benchmark            : Performance benchmarks (~12 programs)
#
#   Total: ~3,420 individual test executions across 36 parallel jobs
#     - RV64: 21 jobs (6 base + 15 variant configs)
#     - RV32: 15 jobs (10 cv32a65x + 5 cv32a6_imac_sv32)
#
# Note: coremark in this workflow is run with veri-testharness only (no spike)
# to avoid Spike timeout in CI runtime-constrained environments.

name: openhw-apu-full

on:
  # Temporary: trigger full suite on pushes to dev branch
  push:
    branches:
      - task/ci_flow
  # Manual trigger
  workflow_dispatch:
  # Nightly full regression at Europe midnight (00:00 CET = 23:00 UTC)
  schedule:
    - cron: '0 23 * * *'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SPIKE_TANDEM: 1
  NUM_JOBS: 8

jobs:
  # ============================================================
  # Stage 1: Setup and cache tools
  # ============================================================
  setup-tools:
    name: Setup Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env
        with:
          install-tools: 'true'

  # ============================================================
  # Stage 2: RV64 Test Execution (parallel matrix jobs)
  # ============================================================
  execute-rv64-tests:
    name: RV64 ${{ matrix.testcase }} (${{ matrix.config }})
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # ============================================================
          # cv64a6_imafdc_sv39 (base config)
          # ============================================================
          # Smoke tests - quick sanity check
          - testcase: smoke-tests-cv64a6_imafdc_sv39
            config: cv64a6_imafdc_sv39
          # Architecture compliance tests
          - testcase: dv-riscv-arch-test
            config: cv64a6_imafdc_sv39
          # Standard RISC-V tests - p-mode + v-mode
          - testcase: dv-riscv-tests
            config: cv64a6_imafdc_sv39
          # RISC-V compliance suite
          - testcase: dv-riscv-compliance
            config: cv64a6_imafdc_sv39
          # CVA6-specific directed tests
          - testcase: cv64a6_imafdc_tests
            config: cv64a6_imafdc_sv39
          # Performance benchmarks
          - testcase: benchmark
            config: cv64a6_imafdc_sv39

          # ============================================================
          # cv64a6_imafdc_sv39_hpdcache (HPDcache variant)
          # ============================================================
          - testcase: dv-riscv-arch-test
            config: cv64a6_imafdc_sv39_hpdcache
          - testcase: dv-riscv-tests
            config: cv64a6_imafdc_sv39_hpdcache
            testlists: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-p.yaml ../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
          - testcase: dv-riscv-compliance
            config: cv64a6_imafdc_sv39_hpdcache
            run_cmd: "python3 cva6.py --testlist=../tests/testlist_riscv-compliance-cv64a6_imafdc_sv39.yaml --target cv64a6_imafdc_sv39_hpdcache --iss_yaml=cva6.yaml --iss=veri-testharness,spike --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE"
          - testcase: cv64a6_imafdc_tests
            config: cv64a6_imafdc_sv39_hpdcache
          - testcase: benchmark
            config: cv64a6_imafdc_sv39_hpdcache

          # ============================================================
          # cv64a6_imafdc_sv39_hpdcache_wb (HPDcache + Write-back)
          # ============================================================
          - testcase: dv-riscv-arch-test
            config: cv64a6_imafdc_sv39_hpdcache_wb
          - testcase: dv-riscv-tests
            config: cv64a6_imafdc_sv39_hpdcache_wb
            testlists: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-p.yaml ../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
          - testcase: dv-riscv-compliance
            config: cv64a6_imafdc_sv39_hpdcache_wb
            run_cmd: "python3 cva6.py --testlist=../tests/testlist_riscv-compliance-cv64a6_imafdc_sv39.yaml --target cv64a6_imafdc_sv39_hpdcache_wb --iss_yaml=cva6.yaml --iss=veri-testharness,spike --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE"
          - testcase: cv64a6_imafdc_tests
            config: cv64a6_imafdc_sv39_hpdcache_wb
          - testcase: benchmark
            config: cv64a6_imafdc_sv39_hpdcache_wb

          # ============================================================
          # cv64a6_imafdc_sv39_wb (Write-back variant)
          # ============================================================
          - testcase: dv-riscv-arch-test
            config: cv64a6_imafdc_sv39_wb
            run_cmd: "sed '/^[[:space:]]*#K$/,$d' ../tests/testlist_riscv-arch-test-cv64a6_imafdc_sv39.yaml > /tmp/testlist-no-zkn.yaml && python3 cva6.py --testlist=/tmp/testlist-no-zkn.yaml --target cv64a6_imafdc_sv39_wb --iss_yaml=cva6.yaml --iss=veri-testharness,spike --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE --linker=../tests/riscv-arch-test/riscv-target/spike/link.ld"
          - testcase: dv-riscv-tests
            config: cv64a6_imafdc_sv39_wb
            testlists: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-p.yaml ../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
          - testcase: dv-riscv-compliance
            config: cv64a6_imafdc_sv39_wb
            run_cmd: "python3 cva6.py --testlist=../tests/testlist_riscv-compliance-cv64a6_imafdc_sv39.yaml --target cv64a6_imafdc_sv39_wb --iss_yaml=cva6.yaml --iss=veri-testharness,spike --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE"
          - testcase: cv64a6_imafdc_tests
            config: cv64a6_imafdc_sv39_wb
          - testcase: benchmark
            config: cv64a6_imafdc_sv39_wb
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run ${{ matrix.testcase }}
        run: |
          set -x
          # Create result tracking directory (before anything else)
          mkdir -p ci-results
          echo "1" > ci-results/exit_code
          source verif/sim/setup-env.sh
          # Override testlists when specified (hpdcache/wb variants share sv39 testlists)
          if [ -n "${{ matrix.testlists }}" ]; then
            export DV_TESTLISTS="${{ matrix.testlists }}"
          fi
          # Run test and capture exit code
          rc=0
          if [ -n "${{ matrix.run_cmd }}" ]; then
            # Custom command: bypass script to use different testlist/config.
            # Install the same tools the standard script would install.
            source verif/regress/install-verilator.sh
            source verif/regress/install-spike.sh
            if [[ "${{ matrix.testcase }}" == "dv-riscv-arch-test" ]]; then
              source verif/regress/install-riscv-arch-test.sh
            elif [[ "${{ matrix.testcase }}" == "dv-riscv-compliance" ]]; then
              source verif/regress/install-riscv-compliance.sh
            fi
            cd verif/sim
            # Write run_cmd to temp script via heredoc to preserve quoting
            # (quoted heredoc delimiter prevents shell expansion of $ and ')
            cat > /tmp/run_cmd.sh <<'RUNCMD_EOF'
          ${{ matrix.run_cmd }}
          RUNCMD_EOF
            bash /tmp/run_cmd.sh || rc=$?
            cd -
          else
            DV_SIMULATORS=veri-testharness,spike \
            DV_TARGET=${{ matrix.config }} \
              bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
          fi
          # Save result (persists even if test cleans output)
          echo "$rc" > ci-results/exit_code
          # Copy iss_regr.log if available (some scripts delete output)
          find verif/sim -name "iss_regr.log" -exec cp {} ci-results/ \; 2>/dev/null || true
          exit $rc

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rv64-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14

  # ============================================================
  # Stage 3: RV32 Test Execution (parallel matrix jobs)
  # ============================================================
  execute-rv32-tests:
    name: RV32 ${{ matrix.testcase }} (${{ matrix.config }})
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # Smoke tests - quick sanity check
          - testcase: smoke-tests-cv32a65x
            config: cv32a65x
          # Architecture compliance tests
          - testcase: dv-riscv-arch-test
            config: cv32a65x
          # Standard RISC-V tests - p-mode only
          # Note: cv32a65x has no MMU, so only p-mode testlist exists
          - testcase: dv-riscv-tests
            config: cv32a65x
            testlists: "../tests/testlist_riscv-tests-cv32a65x-p.yaml"
          # RISC-V compliance suite
          - testcase: dv-riscv-compliance
            config: cv32a65x
          # CVA6-specific directed tests
          - testcase: cv32a6_tests
            config: cv32a65x
          # CSR access verification tests
          - testcase: dv-riscv-csr-access-test
            config: cv32a65x
          # CSR embedded tests
          - testcase: dv-csr-embedded-tests
            config: cv32a65x
          # Performance benchmarks
          - testcase: benchmark
            config: cv32a65x
          # hwconfig configuration sanity tests
          - testcase: hwconfig_tests
            config: cv32a65x
          # CoreMark on hwconfig (Verilator only to avoid Spike timeout)
          - testcase: coremark
            config: cv32a65x
          # ============================================================
          # cv32a6_imac_sv32 (SV32 MMU - unique RV32 MMU coverage)
          # ============================================================
          # Smoke tests
          - testcase: smoke-tests-cv32a6_imac_sv32
            config: cv32a6_imac_sv32
          # MMU SV32 architecture tests
          - testcase: dv-riscv-mmu-sv32-test
            config: cv32a6_imac_sv32
          # Standard RISC-V tests - p-mode + v-mode
          # cv32a6_imac_sv32 has SV32 MMU, supports v-mode
          - testcase: dv-riscv-tests
            config: cv32a6_imac_sv32
            testlists: "../tests/testlist_riscv-tests-rv32ima-p.yaml ../tests/testlist_riscv-tests-rv32ima-v.yaml"
          # RISC-V compliance suite
          - testcase: dv-riscv-compliance
            config: cv32a6_imac_sv32
            run_cmd: "python3 cva6.py --testlist=../tests/testlist_riscv-compliance-rv32ima.yaml --target cv32a6_imac_sv32 --iss_yaml=cva6.yaml --iss=veri-testharness --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE"
          # Performance benchmarks
          - testcase: benchmark
            config: cv32a6_imac_sv32
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run ${{ matrix.testcase }}
        run: |
          set -x
          # Create result tracking directory (before anything else)
          mkdir -p ci-results
          echo "1" > ci-results/exit_code
          source verif/sim/setup-env.sh
          # Override testlists when specified (e.g., cv32a65x has no v-mode tests)
          if [ -n "${{ matrix.testlists }}" ]; then
            export DV_TESTLISTS="${{ matrix.testlists }}"
          fi
          # Run test and capture exit code
          rc=0
          if [ -n "${{ matrix.run_cmd }}" ]; then
            # Custom command: bypass script to use different testlist/config.
            # Install the same tools the standard script would install.
            source verif/regress/install-verilator.sh
            source verif/regress/install-spike.sh
            if [[ "${{ matrix.testcase }}" == "dv-riscv-arch-test" ]]; then
              source verif/regress/install-riscv-arch-test.sh
            elif [[ "${{ matrix.testcase }}" == "dv-riscv-compliance" ]]; then
              source verif/regress/install-riscv-compliance.sh
            elif [[ "${{ matrix.testcase }}" == "dv-riscv-tests" ]]; then
              source verif/regress/install-riscv-tests.sh
            fi
            cd verif/sim
            # Write run_cmd to temp script via heredoc to preserve quoting
            cat > /tmp/run_cmd.sh <<'RUNCMD_EOF'
          ${{ matrix.run_cmd }}
          RUNCMD_EOF
            bash /tmp/run_cmd.sh || rc=$?
            cd -
          else
            if [ "${{ matrix.testcase }}" = "coremark" ]; then
              DV_SIMULATORS=veri-testharness \
              DV_TARGET=${{ matrix.config }} \
              DV_HWCONFIG_OPTS=${{ matrix.config }} \
                bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
            elif [ "${{ matrix.testcase }}" = "dv-csr-embedded-tests" ] && [ "${{ matrix.config }}" = "cv32a65x" ]; then
              DV_SIMULATORS=veri-testharness \
              DV_TARGET=${{ matrix.config }} \
                bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
            elif [ "${{ matrix.testcase }}" = "hwconfig_tests" ]; then
              DV_SIMULATORS=veri-testharness,spike \
              DV_TARGET=${{ matrix.config }} \
              DV_HWCONFIG_OPTS=${{ matrix.config }} \
                bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
            else
              DV_SIMULATORS=veri-testharness,spike \
              DV_TARGET=${{ matrix.config }} \
                bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
            fi
          fi
          # Save result (persists even if test cleans output)
          echo "$rc" > ci-results/exit_code
          # Copy iss_regr.log if available (some scripts delete output)
          find verif/sim -name "iss_regr.log" -exec cp {} ci-results/ \; 2>/dev/null || true
          exit $rc

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rv32-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14
