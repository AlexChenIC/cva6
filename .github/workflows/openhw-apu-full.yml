# OpenHW Full APU Test Suite
# Comprehensive Verilator regression tests for CVA6 APU configurations
#
# Test coverage (all Verilator-compatible suites used by this workflow):
#
#   RV64 configs:
#     - cv64a6_imafdc_sv39             (base)
#     - cv64a6_imafdc_sv39_hpdcache    (HPDcache)
#     - cv64a6_imafdc_sv39_hpdcache_wb (HPDcache + Write-back)
#     - cv64a6_imafdc_sv39_wb          (Write-back)
#
#   RV64 test suites per config:
#     - smoke-tests          : Quick sanity check (~6 tests) [sv39 only]
#     - dv-riscv-arch-test   : RISC-V architecture compliance (~221 tests)
#     - dv-riscv-tests       : Standard RISC-V tests, p+v mode (~229 tests)
#     - dv-riscv-compliance  : RISC-V compliance suite (~183 tests)
#     - cv64a6_imafdc_tests  : CVA6-specific directed tests (~6 tests)
#     - benchmark            : Performance benchmarks (~12 programs)
#
#   RV32 (cv32a65x):
#     - smoke-tests          : Quick sanity check (~1 test)
#     - dv-riscv-arch-test   : RISC-V architecture compliance (~105 tests)
#     - dv-riscv-tests       : Standard RISC-V tests, p-mode only (~94 tests)
#     - dv-riscv-compliance  : RISC-V compliance suite (~183 tests)
#     - cv32a6_tests         : CVA6-specific directed tests (~6 tests)
#     - dv-riscv-csr-access-test : CSR access verification tests (~9 tests)
#     - dv-csr-embedded-tests: Embedded CSR tests (~5 tests)
#     - benchmark            : Performance benchmarks (~12 programs)
#     - hwconfig_tests       : hwconfig toolchain sanity
#     - coremark             : coremark-on-hwconfig benchmark [veri-testharness only]
#
#   RV32 (cv32a6_imac_sv32):
#     - smoke-tests          : Quick sanity check (~4 tests)
#     - dv-riscv-mmu-sv32-test : SV32 MMU page table tests (~60 tests)
#     - dv-riscv-tests       : Standard RISC-V tests, p+v mode (~173 tests)
#     - dv-riscv-compliance  : RISC-V compliance suite (~183 tests)
#     - benchmark            : Performance benchmarks (~12 programs)
#
#   Total: ~3,420 individual test executions across 36 parallel jobs
#     - RV64: 21 jobs (6 base + 15 variant configs)
#     - RV32: 15 jobs (10 cv32a65x + 5 cv32a6_imac_sv32)
#
# Not included in this workflow (VCS-UVM-only or out-of-scope):
#   - dv-generated-tests, dv-generated-xif-tests, dv-interrupt-test
#   - smoke-gen_tests, debug_test, pmp_cv32a65x_tests
#   - dhrystone (hwconfig mode)
#   - cvxif_verif_regression
#
# Note: smoke-tests runs only on sv39 base config (script hardcodes target).
# dv-riscv-compliance for hpdcache/wb variants uses run_cmd to call cva6.py
# directly with the sv39 base testlist (the script constructs path from
# DV_TARGET, but no variant-specific testlist exists).
# Note: coremark in this workflow is run with veri-testharness only (no spike)
# to avoid Spike timeout in CI runtime-constrained environments.
# Note: cv64a6_imafdc_sv39_wb uses a filtered arch-test testlist (no-zkn)
# because that config has ZKN disabled (ZKN: bit'(0)). The 37 K extension
# tests (pack, AES, SHA) are excluded; 184 non-K tests still run.

name: openhw-apu-full

on:
  # Temporary: trigger full suite on pushes to dev branch
  push:
    branches:
      - task/ci_flow
  # Manual trigger
  workflow_dispatch:
  # Temporary: trigger full suite on PRs for validation
  pull_request:
  # Nightly full regression at Europe midnight (00:00 CET = 23:00 UTC)
  schedule:
    - cron: '0 23 * * *'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SPIKE_TANDEM: 1
  NUM_JOBS: 8

jobs:
  # ============================================================
  # Stage 1: Setup and cache tools
  # ============================================================
  setup-tools:
    name: Setup Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env
        with:
          install-tools: 'true'

  # ============================================================
  # Stage 2: RV64 Test Execution (parallel matrix jobs)
  # ============================================================
  execute-rv64-tests:
    name: RV64 ${{ matrix.testcase }} (${{ matrix.config }})
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # ============================================================
          # cv64a6_imafdc_sv39 (base config)
          # ============================================================
          # Smoke tests - quick sanity check (~6 tests)
          - testcase: smoke-tests-cv64a6_imafdc_sv39
            config: cv64a6_imafdc_sv39
          # Architecture compliance tests (~221 tests)
          - testcase: dv-riscv-arch-test
            config: cv64a6_imafdc_sv39
          # Standard RISC-V tests - p-mode + v-mode (~229 tests)
          - testcase: dv-riscv-tests
            config: cv64a6_imafdc_sv39
          # RISC-V compliance suite (~183 tests)
          - testcase: dv-riscv-compliance
            config: cv64a6_imafdc_sv39
          # CVA6-specific directed tests (~6 tests)
          - testcase: cv64a6_imafdc_tests
            config: cv64a6_imafdc_sv39
          # Performance benchmarks (~12 programs)
          - testcase: benchmark
            config: cv64a6_imafdc_sv39

          # ============================================================
          # cv64a6_imafdc_sv39_hpdcache (HPDcache variant)
          # Note: smoke-tests skipped (script hardcodes target)
          # Compliance uses run_cmd because the script constructs testlist
          # path from DV_TARGET, but no hpdcache-specific testlist exists.
          # We reuse the sv39 base testlist directly via cva6.py.
          # ============================================================
          - testcase: dv-riscv-arch-test
            config: cv64a6_imafdc_sv39_hpdcache
          - testcase: dv-riscv-tests
            config: cv64a6_imafdc_sv39_hpdcache
            testlists: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-p.yaml ../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
          - testcase: dv-riscv-compliance
            config: cv64a6_imafdc_sv39_hpdcache
            run_cmd: "python3 cva6.py --testlist=../tests/testlist_riscv-compliance-cv64a6_imafdc_sv39.yaml --target cv64a6_imafdc_sv39_hpdcache --iss_yaml=cva6.yaml --iss=veri-testharness,spike --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE"
          - testcase: cv64a6_imafdc_tests
            config: cv64a6_imafdc_sv39_hpdcache
          - testcase: benchmark
            config: cv64a6_imafdc_sv39_hpdcache

          # ============================================================
          # cv64a6_imafdc_sv39_hpdcache_wb (HPDcache + Write-back)
          # ============================================================
          - testcase: dv-riscv-arch-test
            config: cv64a6_imafdc_sv39_hpdcache_wb
          - testcase: dv-riscv-tests
            config: cv64a6_imafdc_sv39_hpdcache_wb
            testlists: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-p.yaml ../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
          - testcase: dv-riscv-compliance
            config: cv64a6_imafdc_sv39_hpdcache_wb
            run_cmd: "python3 cva6.py --testlist=../tests/testlist_riscv-compliance-cv64a6_imafdc_sv39.yaml --target cv64a6_imafdc_sv39_hpdcache_wb --iss_yaml=cva6.yaml --iss=veri-testharness,spike --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE"
          - testcase: cv64a6_imafdc_tests
            config: cv64a6_imafdc_sv39_hpdcache_wb
          - testcase: benchmark
            config: cv64a6_imafdc_sv39_hpdcache_wb

          # ============================================================
          # cv64a6_imafdc_sv39_wb (Write-back variant)
          # arch-test: ZKN disabled (ZKN: bit'(0)), so K ext tests are
          # filtered out on-the-fly via sed (37 tests removed, 184 remain).
          # compliance: reuses sv39 base testlist via run_cmd.
          # ============================================================
          - testcase: dv-riscv-arch-test
            config: cv64a6_imafdc_sv39_wb
            run_cmd: "sed '/^[[:space:]]*#K$/,$d' ../tests/testlist_riscv-arch-test-cv64a6_imafdc_sv39.yaml > /tmp/testlist-no-zkn.yaml && python3 cva6.py --testlist=/tmp/testlist-no-zkn.yaml --target cv64a6_imafdc_sv39_wb --iss_yaml=cva6.yaml --iss=veri-testharness,spike --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE --linker=../tests/riscv-arch-test/riscv-target/spike/link.ld"
          - testcase: dv-riscv-tests
            config: cv64a6_imafdc_sv39_wb
            testlists: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-p.yaml ../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
          - testcase: dv-riscv-compliance
            config: cv64a6_imafdc_sv39_wb
            run_cmd: "python3 cva6.py --testlist=../tests/testlist_riscv-compliance-cv64a6_imafdc_sv39.yaml --target cv64a6_imafdc_sv39_wb --iss_yaml=cva6.yaml --iss=veri-testharness,spike --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE"
          - testcase: cv64a6_imafdc_tests
            config: cv64a6_imafdc_sv39_wb
          - testcase: benchmark
            config: cv64a6_imafdc_sv39_wb
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run ${{ matrix.testcase }}
        run: |
          set -x
          # Create result tracking directory (before anything else)
          mkdir -p ci-results
          echo "1" > ci-results/exit_code
          source verif/sim/setup-env.sh
          # Override testlists when specified (hpdcache/wb variants share sv39 testlists)
          if [ -n "${{ matrix.testlists }}" ]; then
            export DV_TESTLISTS="${{ matrix.testlists }}"
          fi
          # Run test and capture exit code
          rc=0
          if [ -n "${{ matrix.run_cmd }}" ]; then
            # Custom command: bypass script to use different testlist/config.
            # Install the same tools the standard script would install.
            source verif/regress/install-verilator.sh
            source verif/regress/install-spike.sh
            if [[ "${{ matrix.testcase }}" == "dv-riscv-arch-test" ]]; then
              source verif/regress/install-riscv-arch-test.sh
            elif [[ "${{ matrix.testcase }}" == "dv-riscv-compliance" ]]; then
              source verif/regress/install-riscv-compliance.sh
            fi
            cd verif/sim
            # Write run_cmd to temp script via heredoc to preserve quoting
            # (quoted heredoc delimiter prevents shell expansion of $ and ')
            cat > /tmp/run_cmd.sh <<'RUNCMD_EOF'
          ${{ matrix.run_cmd }}
          RUNCMD_EOF
            bash /tmp/run_cmd.sh || rc=$?
            cd -
          else
            DV_SIMULATORS=veri-testharness,spike \
            DV_TARGET=${{ matrix.config }} \
              bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
          fi
          # Save result (persists even if test cleans output)
          echo "$rc" > ci-results/exit_code
          # Copy iss_regr.log if available (some scripts delete output)
          find verif/sim -name "iss_regr.log" -exec cp {} ci-results/ \; 2>/dev/null || true
          exit $rc

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rv64-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14

  # ============================================================
  # Stage 3: RV32 Test Execution (parallel matrix jobs)
  # ============================================================
  execute-rv32-tests:
    name: RV32 ${{ matrix.testcase }} (${{ matrix.config }})
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # Smoke tests - quick sanity check
          - testcase: smoke-tests-cv32a65x
            config: cv32a65x
          # Architecture compliance tests (~105 tests)
          - testcase: dv-riscv-arch-test
            config: cv32a65x
          # Standard RISC-V tests - p-mode only (~94 tests)
          # Note: cv32a65x has no MMU, so only p-mode testlist exists
          - testcase: dv-riscv-tests
            config: cv32a65x
            testlists: "../tests/testlist_riscv-tests-cv32a65x-p.yaml"
          # RISC-V compliance suite (~183 tests)
          - testcase: dv-riscv-compliance
            config: cv32a65x
          # CVA6-specific directed tests (~6 tests)
          - testcase: cv32a6_tests
            config: cv32a65x
          # CSR access verification tests
          - testcase: dv-riscv-csr-access-test
            config: cv32a65x
          # CSR embedded tests (~5 tests)
          - testcase: dv-csr-embedded-tests
            config: cv32a65x
          # Performance benchmarks (~12 programs)
          - testcase: benchmark
            config: cv32a65x
          # hwconfig configuration sanity tests
          - testcase: hwconfig_tests
            config: cv32a65x
          # CoreMark on hwconfig (Verilator only to avoid Spike timeout)
          - testcase: coremark
            config: cv32a65x
          # ============================================================
          # cv32a6_imac_sv32 (SV32 MMU - unique RV32 MMU coverage)
          # No config-specific testlists exist for tests/compliance.
          # Uses generic rv32ima testlists. Has SV32 MMU so v-mode works.
          # ============================================================
          # Smoke tests - quick sanity for SV32 MMU config
          - testcase: smoke-tests-cv32a6_imac_sv32
            config: cv32a6_imac_sv32
          # MMU SV32 architecture tests (~60 tests)
          - testcase: dv-riscv-mmu-sv32-test
            config: cv32a6_imac_sv32
          # Standard RISC-V tests - p-mode + v-mode (~173 tests)
          # cv32a6_imac_sv32 has SV32 MMU, supports v-mode (unlike cv32a65x)
          - testcase: dv-riscv-tests
            config: cv32a6_imac_sv32
            testlists: "../tests/testlist_riscv-tests-rv32ima-p.yaml ../tests/testlist_riscv-tests-rv32ima-v.yaml"
          # RISC-V compliance suite (~183 tests)
          # dv-riscv-compliance.sh doesn't support DV_TESTLISTS override,
          # so we use run_cmd to call cva6.py directly with rv32ima testlist.
          - testcase: dv-riscv-compliance
            config: cv32a6_imac_sv32
            run_cmd: "python3 cva6.py --testlist=../tests/testlist_riscv-compliance-rv32ima.yaml --target cv32a6_imac_sv32 --iss_yaml=cva6.yaml --iss=veri-testharness --issrun_opts=+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE"
          # Performance benchmarks (~12 programs)
          - testcase: benchmark
            config: cv32a6_imac_sv32
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run ${{ matrix.testcase }}
        run: |
          set -x
          # Create result tracking directory (before anything else)
          mkdir -p ci-results
          echo "1" > ci-results/exit_code
          source verif/sim/setup-env.sh
          # Override testlists when specified (e.g., cv32a65x has no v-mode tests)
          if [ -n "${{ matrix.testlists }}" ]; then
            export DV_TESTLISTS="${{ matrix.testlists }}"
          fi
          # Run test and capture exit code
          rc=0
          if [ -n "${{ matrix.run_cmd }}" ]; then
            # Custom command: bypass script to use different testlist/config.
            # Install the same tools the standard script would install.
            source verif/regress/install-verilator.sh
            source verif/regress/install-spike.sh
            if [[ "${{ matrix.testcase }}" == "dv-riscv-arch-test" ]]; then
              source verif/regress/install-riscv-arch-test.sh
            elif [[ "${{ matrix.testcase }}" == "dv-riscv-compliance" ]]; then
              source verif/regress/install-riscv-compliance.sh
            elif [[ "${{ matrix.testcase }}" == "dv-riscv-tests" ]]; then
              source verif/regress/install-riscv-tests.sh
            fi
            cd verif/sim
            # Write run_cmd to temp script via heredoc to preserve quoting
            cat > /tmp/run_cmd.sh <<'RUNCMD_EOF'
          ${{ matrix.run_cmd }}
          RUNCMD_EOF
            bash /tmp/run_cmd.sh || rc=$?
            cd -
          else
            if [ "${{ matrix.testcase }}" = "coremark" ]; then
              DV_SIMULATORS=veri-testharness \
              DV_TARGET=${{ matrix.config }} \
              DV_HWCONFIG_OPTS=${{ matrix.config }} \
                bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
            elif [ "${{ matrix.testcase }}" = "dv-csr-embedded-tests" ] && [ "${{ matrix.config }}" = "cv32a65x" ]; then
              DV_SIMULATORS=veri-testharness \
              DV_TARGET=${{ matrix.config }} \
                bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
            elif [ "${{ matrix.testcase }}" = "hwconfig_tests" ]; then
              DV_SIMULATORS=veri-testharness,spike \
              DV_TARGET=${{ matrix.config }} \
              DV_HWCONFIG_OPTS=${{ matrix.config }} \
                bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
            else
              DV_SIMULATORS=veri-testharness,spike \
              DV_TARGET=${{ matrix.config }} \
                bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
            fi
          fi
          # Save result (persists even if test cleans output)
          echo "$rc" > ci-results/exit_code
          # Copy iss_regr.log if available (some scripts delete output)
          find verif/sim -name "iss_regr.log" -exec cp {} ci-results/ \; 2>/dev/null || true
          exit $rc

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rv32-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14

  # ============================================================
  # Stage 4: Report Summary
  # ============================================================
  report-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs:
      - setup-tools
      - execute-rv64-tests
      - execute-rv32-tests
    if: ${{ always() && !cancelled() }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate Summary Report
        run: |
          echo "## OpenHW CVA6 Full APU Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Arch | Test Suite | Config | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------------|--------|--------|" >> $GITHUB_STEP_SUMMARY

          total_passed=0
          total_failed=0
          total_jobs=0
          expected_jobs=36
          any_failure=0
          setup_result="${{ needs.setup-tools.result }}"
          rv64_result="${{ needs.execute-rv64-tests.result }}"
          rv32_result="${{ needs.execute-rv32-tests.result }}"

          # Process each artifact directory
          for dir in artifacts/*/; do
            if [ ! -d "$dir" ]; then
              continue
            fi
            name=$(basename "$dir")
            total_jobs=$((total_jobs + 1))

            # Parse name: {arch}-{config}-{testcase}
            arch=$(echo "$name" | cut -d'-' -f1)
            remainder=$(echo "$name" | sed "s/^${arch}-//")
            # Match longest config prefix first (order matters!)
            if [[ "$remainder" == cv64a6_imafdc_sv39_hpdcache_wb-* ]]; then
              config="cv64a6_imafdc_sv39_hpdcache_wb"
            elif [[ "$remainder" == cv64a6_imafdc_sv39_hpdcache-* ]]; then
              config="cv64a6_imafdc_sv39_hpdcache"
            elif [[ "$remainder" == cv64a6_imafdc_sv39_wb-* ]]; then
              config="cv64a6_imafdc_sv39_wb"
            elif [[ "$remainder" == cv64a6_imafdc_sv39-* ]]; then
              config="cv64a6_imafdc_sv39"
            elif [[ "$remainder" == cv32a6_imac_sv32-* ]]; then
              config="cv32a6_imac_sv32"
            elif [[ "$remainder" == cv32a65x-* ]]; then
              config="cv32a65x"
            else
              config="unknown"
            fi
            testcase=$(echo "$remainder" | sed "s/^${config}-//")

            # 1. Check exit code from result marker (primary source of truth)
            exit_code="missing"
            exit_code_file="$dir/ci-results/exit_code"
            if [ -f "$exit_code_file" ]; then
              exit_code=$(cat "$exit_code_file" | tr -d '[:space:]')
            fi

            # 2. Parse iss_regr.log for detailed test counts
            passed=""
            failed=""
            log_file="$dir/ci-results/iss_regr.log"
            if [ ! -f "$log_file" ]; then
              log_file=$(find "$dir" -name "iss_regr.log" 2>/dev/null | head -1)
            fi
            if [ -n "$log_file" ] && [ -f "$log_file" ]; then
              summary_line=$(grep -E "PASSED.*FAILED" "$log_file" | tail -n 1)
              if [ -n "$summary_line" ]; then
                passed=$(printf "%s" "$summary_line" | sed -n 's/.*\([0-9][0-9]*\)[[:space:]]*PASSED.*/\1/p')
                failed=$(printf "%s" "$summary_line" | sed -n 's/.*\([0-9][0-9]*\)[[:space:]]*FAILED.*/\1/p')
              fi
            fi

            # 3. Determine status (exit code takes priority over log parsing)
            if [ "$exit_code" = "0" ]; then
              # Job exited successfully
              if [ -n "$failed" ] && [ "$failed" -gt 0 ]; then
                # Exit 0 but log shows failures (shouldn't happen, but catch it)
                status="FAIL ($passed passed, $failed failed)"
                total_failed=$((total_failed + failed))
                total_passed=$((total_passed + ${passed:-0}))
                any_failure=1
              elif [ -n "$passed" ]; then
                status="PASS ($passed tests)"
                total_passed=$((total_passed + passed))
              else
                # Exit 0 but no parsed summary line
                if [[ "$name" == *-benchmark ]]; then
                  status="PASS"
                else
                  status="UNKNOWN (no test summary log)"
                  total_failed=$((total_failed + 1))
                  any_failure=1
                fi
              fi
            elif [ "$exit_code" = "missing" ]; then
              # No result marker at all
              status="UNKNOWN (no result marker)"
              total_failed=$((total_failed + 1))
              any_failure=1
            else
              # Non-zero exit code = definite failure
              any_failure=1
              if [ -n "$failed" ] && [ "$failed" -gt 0 ]; then
                status="FAIL ($passed passed, $failed failed)"
                total_failed=$((total_failed + failed))
                total_passed=$((total_passed + ${passed:-0}))
              elif [ -n "$passed" ]; then
                status="FAIL (exit $exit_code, $passed tests ran)"
                total_failed=$((total_failed + 1))
                total_passed=$((total_passed + passed))
              else
                status="FAIL (exit $exit_code)"
                total_failed=$((total_failed + 1))
              fi
            fi

            echo "| ${arch} | ${testcase} | ${config} | ${status} |" >> $GITHUB_STEP_SUMMARY
          done

          if [ "$total_jobs" -ne "$expected_jobs" ]; then
            any_failure=1
            echo "| infra | artifact-count | n/a | FAIL (${total_jobs}/${expected_jobs}) |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$total_jobs" -eq 0 ]; then
            any_failure=1
            echo "| infra | artifact-collection | n/a | FAIL (no artifacts produced) |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$setup_result" != "success" ]; then
            any_failure=1
            echo "| infra | setup-tools | n/a | FAIL (${setup_result}) |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$rv64_result" != "success" ]; then
            any_failure=1
            echo "| infra | execute-rv64-tests | n/a | FAIL (${rv64_result}) |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$rv32_result" != "success" ]; then
            any_failure=1
            echo "| infra | execute-rv32-tests | n/a | FAIL (${rv32_result}) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Jobs:** ${total_jobs}" >> $GITHUB_STEP_SUMMARY
          echo "- **Expected Jobs:** ${expected_jobs}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Passed:** ${total_passed}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Failed:** ${total_failed}" >> $GITHUB_STEP_SUMMARY
          echo "- **Setup Tools Job:** ${setup_result}" >> $GITHUB_STEP_SUMMARY
          echo "- **RV64 Matrix Job:** ${rv64_result}" >> $GITHUB_STEP_SUMMARY
          echo "- **RV32 Matrix Job:** ${rv32_result}" >> $GITHUB_STEP_SUMMARY
          if [ "$any_failure" -eq 1 ]; then
            echo "- **Overall: FAILED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Overall: ALL PASSED**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by OpenHW CVA6 Full APU CI*" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        run: |
          any_failed=0
          found_artifact=0
          artifact_count=0
          expected_jobs=36

          # Check each artifact's exit code
          for dir in artifacts/*/; do
            if [ ! -d "$dir" ]; then
              continue
            fi
            found_artifact=1
            artifact_count=$((artifact_count + 1))
            name=$(basename "$dir")
            exit_code_file="$dir/ci-results/exit_code"
            log_file="$dir/ci-results/iss_regr.log"
            if [ ! -f "$log_file" ]; then
              log_file=$(find "$dir" -name "iss_regr.log" 2>/dev/null | head -1)
            fi
            if [ -f "$exit_code_file" ]; then
              ec=$(cat "$exit_code_file" | tr -d '[:space:]')
              if [ "$ec" != "0" ]; then
                echo "::error::Test failed: ${name} (exit code: ${ec})"
                any_failed=1
              else
                # Successful exit must still provide valid summary for non-benchmark tests
                if [ -n "$log_file" ] && [ -f "$log_file" ]; then
                  summary_line=$(grep -E "PASSED.*FAILED" "$log_file" | tail -n 1)
                  if [ -n "$summary_line" ]; then
                    failed_count=$(printf "%s" "$summary_line" | sed -n 's/.*\([0-9][0-9]*\)[[:space:]]*FAILED.*/\1/p')
                    if [ -n "$failed_count" ] && [ "$failed_count" -gt 0 ]; then
                      echo "::error::Test failed per summary log: ${name} (${failed_count} failed)"
                      any_failed=1
                    fi
                  elif [[ "$name" != *-benchmark ]]; then
                    echo "::error::Missing PASSED/FAILED summary line for non-benchmark job: ${name}"
                    any_failed=1
                  fi
                elif [[ "$name" != *-benchmark ]]; then
                  echo "::error::Missing iss_regr.log for non-benchmark job: ${name}"
                  any_failed=1
                fi
              fi
            else
              echo "::error::Missing result marker: ${name}"
              any_failed=1
            fi
          done

          if [ "$found_artifact" -eq 0 ]; then
            echo "::error::No artifacts found. Upstream setup/matrix jobs likely failed before tests ran."
            any_failed=1
          fi
          if [ "$artifact_count" -ne "$expected_jobs" ]; then
            echo "::error::Unexpected artifact count: ${artifact_count}/${expected_jobs}"
            any_failed=1
          fi

          # Also check if upstream jobs are all successful
          setup_result="${{ needs.setup-tools.result }}"
          rv64_result="${{ needs.execute-rv64-tests.result }}"
          rv32_result="${{ needs.execute-rv32-tests.result }}"
          if [ "$setup_result" != "success" ]; then
            echo "::error::setup-tools job result is ${setup_result}"
            any_failed=1
          fi
          if [ "$rv64_result" != "success" ]; then
            echo "::error::RV64 matrix job result is ${rv64_result}"
            any_failed=1
          fi
          if [ "$rv32_result" != "success" ]; then
            echo "::error::RV32 matrix job result is ${rv32_result}"
            any_failed=1
          fi

          if [ "$any_failed" -eq 1 ]; then
            echo "::error::One or more tests failed. See summary above for details."
            exit 1
          fi

          echo "All tests passed!"
