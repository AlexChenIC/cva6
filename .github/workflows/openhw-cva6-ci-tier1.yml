# ================================================================================
# OpenHW CVA6 CI - Tier 1: Fast Verilator Sanity
# ================================================================================
#
# PURPOSE:
#   Fast Verilator-based sanity regression for the phase-1 tier coverage,
#   extended with the legacy ci.yml configuration coverage.
#   Runs exactly one lightweight smoke test per covered configuration to
#   provide quick automatic sanity checks for pull-requests.
#
# TRIGGER POLICY:
#   pull_request      -> Automatic sanity checks for PRs targeting master
#   workflow_dispatch -> On-demand rerun for manual validation
#
# COVERED CONFIGURATIONS (phase-1 tier coverage + legacy ci.yml configs):
#   RV32:
#     - cv32a65x                        (dual-issue, no MMU)
#     - cv32a60x                        (single-issue, no MMU)
#   RV64:
#     - cv64a6_imafdc_sv39_hpdcache     (HPDcache)
#     - cv64a6_imafdc_sv39_hpdcache_wb  (HPDcache + write-back)
#     - cv64a6_imafdc_sv39_wb           (write-back)
#     - cv64a6_imafdc_sv39              (baseline SV39)
#
# TEST SUITES PER CONFIG:
#   - each RV32 configuration        -> smoke-riscv-tests-p / rv32ui-p-add
#   - each RV64 configuration        -> smoke-riscv-tests-v / rv64ui-v-add
#
# NOTES:
#   - Phase 1 Tier 1 is Verilator + Spike tandem.
#   - Tier 1 is intentionally narrower than Tier 2: the goal is fast signal,
#     not broad regression depth. Directed tests and full regressions are kept
#     in Tier 2/nightly.
# ================================================================================

name: openhw-cva6-ci-tier1

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: openhw-cva6-ci-tier1-${{ github.ref }}
  cancel-in-progress: true

env:
  SPIKE_TANDEM: 1
  NUM_JOBS: 8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ============================================================
  # Stage 1: Populate tool cache
  # ============================================================
  setup-tools:
    name: Setup Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env
        with:
          install-tools: "true"

  # ============================================================
  # Stage 2: RV32 Fast Sanity (parallel matrix jobs)
  # ============================================================
  execute-rv32-tier1:
    name: RV32 Tier1 ${{ matrix.config }} / ${{ matrix.testcase }}
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # cv32a65x - dual-issue RV32, no MMU
          # ----------------------------------------------------------
          # One p-mode RISC-V ISA smoke test for the higher-feature RV32 core.
          - config: cv32a65x
            testcase: smoke-riscv-tests-p
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv32a65x-p.yaml"
            test_name: rv32ui-p-add
            linker: ""

          # ----------------------------------------------------------
          # cv32a60x - single-issue RV32, no MMU
          # ----------------------------------------------------------
          # Same p-mode smoke test on the single-issue RV32 core.
          - config: cv32a60x
            testcase: smoke-riscv-tests-p
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv32a60x-p.yaml"
            test_name: rv32ui-p-add
            linker: ""

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run Tier 1 for ${{ matrix.config }} / ${{ matrix.testcase }}
        env:
          TIER_NAME: Tier 1
          TIER_MODE: ${{ matrix.mode }}
          TIER_CONFIG: ${{ matrix.config }}
          TIER_TESTCASE: ${{ matrix.testcase }}
          TIER_SIMULATOR: ${{ matrix.simulator }}
          TIER_INSTALL_SCRIPT: ${{ matrix.install_script }}
          TIER_TESTLIST: ${{ matrix.testlist }}
          TIER_TEST_NAME: ${{ matrix.test_name }}
          TIER_LINKER: ${{ matrix.linker }}
        run: bash .github/scripts/run-tier-regression.sh

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-rv32-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14

  # ============================================================
  # Stage 3: RV64 Fast Sanity
  # ============================================================
  execute-rv64-tier1:
    name: RV64 Tier1 ${{ matrix.config }} / ${{ matrix.testcase }}
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # Phase-1 and legacy ci.yml RV64 configurations
          # ----------------------------------------------------------
          # One v-mode RISC-V ISA smoke test per RV64 SV39 configuration.
          - config: cv64a6_imafdc_sv39_hpdcache
            testcase: smoke-riscv-tests-v
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
            test_name: rv64ui-v-add
            linker: ""

          - config: cv64a6_imafdc_sv39_hpdcache_wb
            testcase: smoke-riscv-tests-v
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
            test_name: rv64ui-v-add
            linker: ""

          - config: cv64a6_imafdc_sv39_wb
            testcase: smoke-riscv-tests-v
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
            test_name: rv64ui-v-add
            linker: ""

          - config: cv64a6_imafdc_sv39
            testcase: smoke-riscv-tests-v
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
            test_name: rv64ui-v-add
            linker: ""

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run Tier 1 for ${{ matrix.config }} / ${{ matrix.testcase }}
        env:
          TIER_NAME: Tier 1
          TIER_MODE: ${{ matrix.mode }}
          TIER_CONFIG: ${{ matrix.config }}
          TIER_TESTCASE: ${{ matrix.testcase }}
          TIER_SIMULATOR: ${{ matrix.simulator }}
          TIER_INSTALL_SCRIPT: ${{ matrix.install_script }}
          TIER_TESTLIST: ${{ matrix.testlist }}
          TIER_TEST_NAME: ${{ matrix.test_name }}
          TIER_LINKER: ${{ matrix.linker }}
        run: bash .github/scripts/run-tier-regression.sh

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-rv64-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14
