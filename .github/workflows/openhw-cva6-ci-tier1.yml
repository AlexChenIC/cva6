# ================================================================================
# OpenHW CVA6 CI - Tier 1: Fast Verilator Sanity
# ================================================================================
#
# PURPOSE:
#   Fast Verilator-based sanity regression aligned with the configuration
#   coverage from the legacy ci.yml workflow.
#   Runs one representative directed test per legacy CI configuration to
#   provide automatic sanity checks for pull-requests.
#
# TRIGGER POLICY:
#   pull_request      -> Automatic sanity checks for PRs targeting master
#   workflow_dispatch -> On-demand rerun for manual validation
#
# COVERED CONFIGURATIONS (legacy ci.yml parity):
#   RV32:
#     - cv32a65x                        (dual-issue, no MMU)
#   RV64:
#     - cv64a6_imafdc_sv39_hpdcache     (HPDcache)
#     - cv64a6_imafdc_sv39_hpdcache_wb  (HPDcache + write-back)
#     - cv64a6_imafdc_sv39_wb           (write-back)
#     - cv64a6_imafdc_sv39              (baseline SV39)
#
# TEST SUITES PER CONFIG:
#   - cv32a65x                       -> cv32a6_tests
#   - each RV64 configuration        -> cv64a6_imafdc_tests
#
# NOTES:
#   - Tier 1 is Verilator + Spike tandem, matching the legacy ci.yml flow.
#   - Tier 1 is intentionally narrow: one representative testcase per
#     configuration for fast PR-gate signal.
# ================================================================================

name: openhw-cva6-ci-tier1

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: openhw-cva6-ci-tier1-${{ github.ref }}
  cancel-in-progress: true

env:
  SPIKE_TANDEM: 1
  NUM_JOBS: 8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ============================================================
  # Stage 1: Populate tool cache
  # ============================================================
  setup-tools:
    name: Setup Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env
        with:
          install-tools: "true"

  # ============================================================
  # Stage 2: RV32 Fast Sanity (parallel matrix jobs)
  # ============================================================
  execute-rv32-tier1:
    name: RV32 Tier1 ${{ matrix.config }} / ${{ matrix.testcase }}
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # cv32a65x - dual-issue RV32, no MMU
          # ----------------------------------------------------------
          - config: cv32a65x
            testcase: cv32a6_tests
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run Tier 1 for ${{ matrix.config }} / ${{ matrix.testcase }}
        env:
          TIER_NAME: Tier 1
          TIER_MODE: ${{ matrix.mode }}
          TIER_CONFIG: ${{ matrix.config }}
          TIER_TESTCASE: ${{ matrix.testcase }}
          TIER_SIMULATOR: ${{ matrix.simulator }}
          TIER_INSTALL_SCRIPT: ${{ matrix.install_script }}
          TIER_TESTLIST: ${{ matrix.testlist }}
          TIER_TEST_NAME: ${{ matrix.test_name }}
          TIER_LINKER: ${{ matrix.linker }}
        run: bash .github/scripts/run-tier-regression.sh

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-rv32-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14

  # ============================================================
  # Stage 3: RV64 Fast Sanity
  # ============================================================
  execute-rv64-tier1:
    name: RV64 Tier1 ${{ matrix.config }} / ${{ matrix.testcase }}
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # Legacy ci.yml RV64 configurations
          # ----------------------------------------------------------
          - config: cv64a6_imafdc_sv39_hpdcache
            testcase: cv64a6_imafdc_tests
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          - config: cv64a6_imafdc_sv39_hpdcache_wb
            testcase: cv64a6_imafdc_tests
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          - config: cv64a6_imafdc_sv39_wb
            testcase: cv64a6_imafdc_tests
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          - config: cv64a6_imafdc_sv39
            testcase: cv64a6_imafdc_tests
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run Tier 1 for ${{ matrix.config }} / ${{ matrix.testcase }}
        env:
          TIER_NAME: Tier 1
          TIER_MODE: ${{ matrix.mode }}
          TIER_CONFIG: ${{ matrix.config }}
          TIER_TESTCASE: ${{ matrix.testcase }}
          TIER_SIMULATOR: ${{ matrix.simulator }}
          TIER_INSTALL_SCRIPT: ${{ matrix.install_script }}
          TIER_TESTLIST: ${{ matrix.testlist }}
          TIER_TEST_NAME: ${{ matrix.test_name }}
          TIER_LINKER: ${{ matrix.linker }}
        run: bash .github/scripts/run-tier-regression.sh

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-rv64-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14
