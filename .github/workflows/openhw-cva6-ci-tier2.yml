# ================================================================================
# OpenHW CVA6 CI - Tier 2: Daily Verilator Regression
# ================================================================================
#
# PURPOSE:
#   Nightly Verilator regression aligned with the remaining coverage from the
#   legacy ci.yml workflow after the fast Tier 1 split.
#   Runs the heavier legacy CI regression jobs where longer runtime is acceptable.
#
# SCHEDULE: Daily at 22:00 UTC
#
# TRIGGER POLICY:
#   schedule          -> Automatic daily regression (22:00 UTC)
#   workflow_dispatch -> On-demand Tier 2 regression for manual validation
#
# COVERED CONFIGURATIONS (remaining legacy ci.yml coverage after Tier 1):
#   RV32:
#     - cv32a65x                        (dual-issue, no MMU)    [1 testcase]
#   RV64:
#     - cv64a6_imafdc_sv39_hpdcache     (HPDcache)              [1 testcase]
#     - cv64a6_imafdc_sv39_hpdcache_wb  (HPDcache + write-back) [1 testcase]
#
# TEST SUITES PER CONFIG:
#   - cv32a65x                       -> dv-riscv-arch-test
#   - cv64a6_imafdc_sv39_hpdcache    -> dv-riscv-arch-test
#   - cv64a6_imafdc_sv39_hpdcache_wb -> dv-riscv-arch-test
#
# NOTES:
#   - Configurations with only one legacy ci.yml testcase are fully covered by
#     Tier 1 and therefore do not need an additional Tier 2 job for parity.
#   - Broader regression suites can be added later as a separate coverage
#     expansion once their runtime and failure reporting are agreed.
# ================================================================================

name: openhw-cva6-ci-tier2

on:
  schedule:
    - cron: "0 22 * * *" # 22:00 UTC
  workflow_dispatch:

concurrency:
  group: openhw-cva6-ci-tier2-${{ github.ref }}
  cancel-in-progress: true

env:
  SPIKE_TANDEM: 1
  NUM_JOBS: 8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ============================================================
  # Stage 1: Populate tool cache
  # ============================================================
  setup-tools:
    name: Setup Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env
        with:
          install-tools: "true"

  # ============================================================
  # Stage 2: RV32 Regression (parallel matrix jobs)
  # ============================================================
  execute-rv32-tier2:
    name: RV32 Tier2 ${{ matrix.config }} / ${{ matrix.testcase }}
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # cv32a65x - dual-issue RV32, no MMU
          # ----------------------------------------------------------

          # RISC-V architecture test suite from legacy ci.yml
          - config: cv32a65x
            testcase: dv-riscv-arch-test
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run Tier 2 for ${{ matrix.config }} / ${{ matrix.testcase }}
        env:
          TIER_NAME: Tier 2
          TIER_MODE: ${{ matrix.mode }}
          TIER_CONFIG: ${{ matrix.config }}
          TIER_TESTCASE: ${{ matrix.testcase }}
          TIER_SIMULATOR: ${{ matrix.simulator }}
          TIER_INSTALL_SCRIPT: ${{ matrix.install_script }}
          TIER_TESTLIST: ${{ matrix.testlist }}
          TIER_TEST_NAME: ${{ matrix.test_name }}
          TIER_LINKER: ${{ matrix.linker }}
          TIER_HWCONFIG_OPTS: ${{ matrix.hwconfig_opts }}
        run: bash .github/scripts/run-tier-regression.sh

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier2-rv32-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14

  # ============================================================
  # Stage 3: RV64 Regression (parallel matrix jobs)
  # ============================================================
  execute-rv64-tier2:
    name: RV64 Tier2 ${{ matrix.config }} / ${{ matrix.testcase }}
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:
          # ----------------------------------------------------------
          # Legacy ci.yml RV64 architecture tests
          # ----------------------------------------------------------
          - config: cv64a6_imafdc_sv39_hpdcache
            testcase: dv-riscv-arch-test
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          - config: cv64a6_imafdc_sv39_hpdcache_wb
            testcase: dv-riscv-arch-test
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run Tier 2 for ${{ matrix.config }} / ${{ matrix.testcase }}
        env:
          TIER_NAME: Tier 2
          TIER_MODE: ${{ matrix.mode }}
          TIER_CONFIG: ${{ matrix.config }}
          TIER_TESTCASE: ${{ matrix.testcase }}
          TIER_SIMULATOR: ${{ matrix.simulator }}
          TIER_INSTALL_SCRIPT: ${{ matrix.install_script }}
          TIER_TESTLIST: ${{ matrix.testlist }}
          TIER_TEST_NAME: ${{ matrix.test_name }}
          TIER_LINKER: ${{ matrix.linker }}
          TIER_HWCONFIG_OPTS: ${{ matrix.hwconfig_opts }}
        run: bash .github/scripts/run-tier-regression.sh

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier2-rv64-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14
