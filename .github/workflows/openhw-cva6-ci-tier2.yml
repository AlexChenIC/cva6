# ================================================================================
# OpenHW CVA6 CI - Tier 2: Daily Verilator Regression
# ================================================================================
#
# PURPOSE:
#   Comprehensive daily regression against the three primary "green"
#   configurations. Runs the full suite of Verilator-compatible testcases for
#   each config, providing thorough functional coverage on a nightly cadence.
#
# SCHEDULE: Daily at 15:00 UTC (16:00 CET / 17:00 CEST)
#
# TRIGGER POLICY:
#   schedule          → Automatic daily regression (15:00 UTC)
#   workflow_dispatch → On-demand full regression for manual validation
#
# COVERED CONFIGURATIONS (Green Config subset — Jérôme's color-coded figure):
#   RV32:
#     - cv32a65x                        (dual-issue, no MMU)    [10 testcases]
#     - cv32a60x                        (single-issue, no MMU)  [ 6 testcases]
#   RV64:
#     - cv64a6_imafdc_sv39_hpdcache_wb  (HPDcache + write-back) [ 6 testcases]
#
# TEST SUITES PER CONFIG:
#   cv32a65x (10 jobs):
#     smoke-tests, cv32a6_tests, dv-riscv-arch-test, dv-riscv-tests-p,
#     dv-riscv-compliance, dv-riscv-csr-access-test,
#     dv-csr-embedded-tests [veri-testharness only],
#     hwconfig_tests, coremark [veri-testharness only], benchmark
#
#   cv32a60x (6 jobs):
#     cv32a6_tests, dv-riscv-arch-test, dv-riscv-tests-p,
#     dv-riscv-compliance, dv-riscv-csr-access-test, benchmark
#   (Note: hwconfig/coremark/dv-csr-embedded-tests are cv32a65x-specific)
#
#   cv64a6_imafdc_sv39_hpdcache_wb (6 jobs):
#     cv64a6_imafdc_tests, dv-riscv-arch-test,
#     dv-riscv-tests-v [testlist], dv-riscv-tests-p [testlist],
#     dv-riscv-compliance [testlist], benchmark
#
# NOTES:
#   - "dv-riscv-tests-v" / "dv-riscv-tests-p" are job label names, not script
#     names. They run via python3 cva6.py --testlist= (no .sh equivalent).
#     Splitting v/p into separate jobs enables per-mode failure isolation.
#   - dv-csr-embedded-tests uses veri-testharness only: spike does not emulate
#     embedded CSR side effects.
#   - hwconfig_tests and coremark require DV_HWCONFIG_OPTS, encoded via the
#     matrix hwconfig_opts field and applied in the run step.
#   - coremark uses veri-testharness only: spike times out on long benchmark loops.
#
# RELATIONSHIP TO OTHER WORKFLOWS:
#   - Tier 1 (openhw-cva6-ci-tier1.yml) : PR gate, minimal sanity only
#   - Tier 2 (this file)                 : comprehensive daily, superset of Tier 1
#   - openhw-apu-full.yml                : extended full-APU regression (36 jobs)
# ================================================================================

name: openhw-cva6-ci-tier2

on:
  schedule:
    - cron: '0 15 * * *'   # 15:00 UTC = 16:00 CET / 17:00 CEST
  workflow_dispatch:

concurrency:
  group: openhw-cva6-ci-tier2-${{ github.ref }}
  cancel-in-progress: true

env:
  SPIKE_TANDEM: 1
  NUM_JOBS: 8
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ============================================================
  # Stage 1: Populate tool cache
  # ============================================================
  setup-tools:
    name: Setup Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env
        with:
          install-tools: "true"

  # ============================================================
  # Stage 2: RV32 Regression (parallel matrix jobs)
  # ============================================================
  execute-rv32-tier2:
    name: RV32 Tier2 ${{ matrix.config }} / ${{ matrix.testcase }}
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:

          # ----------------------------------------------------------
          # cv32a65x — dual-issue RV32, no MMU, hwconfig-capable
          # ----------------------------------------------------------

          # Quick sanity check (~1 test)
          - config: cv32a65x
            testcase: smoke-tests-cv32a65x
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          # CVA6-specific directed tests
          - config: cv32a65x
            testcase: cv32a6_tests
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          # RISC-V architecture compliance (~105 tests)
          - config: cv32a65x
            testcase: dv-riscv-arch-test
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-arch-test
            testlist: "../tests/testlist_riscv-arch-test-cv32a65x.yaml"
            test_name: ""
            linker: "../tests/riscv-arch-test/riscv-target/spike/link.ld"

          # Standard RISC-V tests, p-mode only (no MMU on cv32a65x, ~94 tests)
          - config: cv32a65x
            testcase: dv-riscv-tests-p
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv32a65x-p.yaml"
            test_name: ""
            linker: ""

          # RISC-V compliance suite (~183 tests)
          - config: cv32a65x
            testcase: dv-riscv-compliance
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-compliance
            testlist: "../tests/testlist_riscv-compliance-cv32a65x.yaml"
            test_name: ""
            linker: ""

          # CSR read/write access verification (~9 tests)
          - config: cv32a65x
            testcase: dv-riscv-csr-access-test
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          # Embedded CSR behavior (~5 tests); veri-testharness only —
          # spike does not emulate embedded CSR side effects
          - config: cv32a65x
            testcase: dv-csr-embedded-tests
            mode: script
            simulator: veri-testharness
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          # hwconfig toolchain sanity (requires DV_HWCONFIG_OPTS)
          - config: cv32a65x
            testcase: hwconfig_tests
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""
            hwconfig_opts: cv32a65x

          # CoreMark benchmark on hwconfig; veri-testharness only —
          # spike times out on long-running benchmark loops
          - config: cv32a65x
            testcase: coremark
            mode: script
            simulator: veri-testharness
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""
            hwconfig_opts: cv32a65x

          # Performance benchmarks (~12 programs: dhrystone, median, etc.)
          - config: cv32a65x
            testcase: benchmark
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          # ----------------------------------------------------------
          # cv32a60x — single-issue RV32, no MMU
          # Note: hwconfig_tests/coremark/dv-csr-embedded-tests are
          #       cv32a65x-specific and not applicable here.
          # ----------------------------------------------------------

          # CVA6-specific directed tests
          - config: cv32a60x
            testcase: cv32a6_tests
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          # RISC-V architecture compliance
          - config: cv32a60x
            testcase: dv-riscv-arch-test
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-arch-test
            testlist: "../tests/testlist_riscv-arch-test-cv32a60x.yaml"
            test_name: ""
            linker: "../tests/riscv-arch-test/riscv-target/spike/link.ld"

          # Standard RISC-V tests, p-mode only (no MMU on cv32a60x)
          - config: cv32a60x
            testcase: dv-riscv-tests-p
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv32a60x-p.yaml"
            test_name: ""
            linker: ""

          # RISC-V compliance suite
          - config: cv32a60x
            testcase: dv-riscv-compliance
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-compliance
            testlist: "../tests/testlist_riscv-compliance-cv32a60x.yaml"
            test_name: ""
            linker: ""

          # CSR access verification
          - config: cv32a60x
            testcase: dv-riscv-csr-access-test
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          # Performance benchmarks
          - config: cv32a60x
            testcase: benchmark
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run Tier 2 for ${{ matrix.config }} / ${{ matrix.testcase }}
        run: |
          set -x
          mkdir -p ci-results
          echo "1" > ci-results/exit_code
          source verif/sim/setup-env.sh
          rc=0

          if [ "${{ matrix.mode }}" = "testlist" ]; then
            if [[ "${{ matrix.simulator }}" == *"veri-testharness"* ]]; then
              source verif/regress/install-verilator.sh
            fi
            source verif/regress/install-spike.sh
            if [ -n "${{ matrix.install_script }}" ]; then
              source verif/regress/${{ matrix.install_script }}.sh
            fi
            LINKER_OPT=""
            if [ -n "${{ matrix.linker }}" ]; then
              LINKER_OPT="--linker=${{ matrix.linker }}"
            fi
            cd verif/sim
            python3 cva6.py \
              --testlist=${{ matrix.testlist }} \
              --target ${{ matrix.config }} \
              --iss_yaml=cva6.yaml \
              --iss=${{ matrix.simulator }} \
              --issrun_opts="+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE" \
              $LINKER_OPT \
              || rc=$?
            cd -
          else
            # hwconfig_opts is set for hwconfig_tests and coremark only
            if [ -n "${{ matrix.hwconfig_opts }}" ]; then
              export DV_HWCONFIG_OPTS="${{ matrix.hwconfig_opts }}"
            fi
            DV_SIMULATORS=${{ matrix.simulator }} \
            DV_TARGET=${{ matrix.config }} \
              bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
          fi

          echo "$rc" > ci-results/exit_code
          find verif/sim -name "iss_regr.log" -exec cp {} ci-results/ \; 2>/dev/null || true
          exit $rc

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier2-rv32-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14

  # ============================================================
  # Stage 3: RV64 Regression (parallel matrix jobs)
  # ============================================================
  execute-rv64-tier2:
    name: RV64 Tier2 ${{ matrix.config }} / ${{ matrix.testcase }}
    runs-on: ubuntu-latest
    needs: setup-tools
    strategy:
      fail-fast: false
      matrix:
        include:

          # ----------------------------------------------------------
          # cv64a6_imafdc_sv39_hpdcache_wb — RV64 HPDcache + write-back
          # ----------------------------------------------------------

          # CVA6-specific directed tests
          - config: cv64a6_imafdc_sv39_hpdcache_wb
            testcase: cv64a6_imafdc_tests
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

          # RISC-V architecture compliance
          - config: cv64a6_imafdc_sv39_hpdcache_wb
            testcase: dv-riscv-arch-test
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-arch-test
            testlist: "../tests/testlist_riscv-arch-test-cv64a6_imafdc_sv39.yaml"
            test_name: ""
            linker: "../tests/riscv-arch-test/riscv-target/spike/link.ld"

          # Standard RISC-V tests, virtual-mode (SV39 MMU)
          # "dv-riscv-tests-v" is a job label — runs via cva6.py --testlist,
          # there is no verif/regress/dv-riscv-tests-v.sh
          - config: cv64a6_imafdc_sv39_hpdcache_wb
            testcase: dv-riscv-tests-v
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-v.yaml"
            test_name: ""
            linker: ""

          # Standard RISC-V tests, physical-mode
          # "dv-riscv-tests-p" is a job label — same note as dv-riscv-tests-v above
          - config: cv64a6_imafdc_sv39_hpdcache_wb
            testcase: dv-riscv-tests-p
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-tests
            testlist: "../tests/testlist_riscv-tests-cv64a6_imafdc_sv39-p.yaml"
            test_name: ""
            linker: ""

          # RISC-V compliance suite (uses sv39 testlist — valid for hpdcache_wb)
          - config: cv64a6_imafdc_sv39_hpdcache_wb
            testcase: dv-riscv-compliance
            mode: testlist
            simulator: veri-testharness,spike
            install_script: install-riscv-compliance
            testlist: "../tests/testlist_riscv-compliance-cv64a6_imafdc_sv39.yaml"
            test_name: ""
            linker: ""

          # Performance benchmarks (~12 programs)
          - config: cv64a6_imafdc_sv39_hpdcache_wb
            testcase: benchmark
            mode: script
            simulator: veri-testharness,spike
            install_script: ""
            testlist: ""
            test_name: ""
            linker: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup CVA6 Environment
        uses: ./.github/actions/setup-cva6-env

      - name: Install prerequisites
        run: source ci/install-prereq.sh

      - name: Run Tier 2 for ${{ matrix.config }} / ${{ matrix.testcase }}
        run: |
          set -x
          mkdir -p ci-results
          echo "1" > ci-results/exit_code
          source verif/sim/setup-env.sh
          rc=0

          if [ "${{ matrix.mode }}" = "testlist" ]; then
            if [[ "${{ matrix.simulator }}" == *"veri-testharness"* ]]; then
              source verif/regress/install-verilator.sh
            fi
            source verif/regress/install-spike.sh
            if [ -n "${{ matrix.install_script }}" ]; then
              source verif/regress/${{ matrix.install_script }}.sh
            fi
            LINKER_OPT=""
            if [ -n "${{ matrix.linker }}" ]; then
              LINKER_OPT="--linker=${{ matrix.linker }}"
            fi
            cd verif/sim
            python3 cva6.py \
              --testlist=${{ matrix.testlist }} \
              --target ${{ matrix.config }} \
              --iss_yaml=cva6.yaml \
              --iss=${{ matrix.simulator }} \
              --issrun_opts="+tb_performance_mode+debug_disable=1+UVM_VERBOSITY=UVM_NONE" \
              $LINKER_OPT \
              || rc=$?
            cd -
          else
            DV_SIMULATORS=${{ matrix.simulator }} \
            DV_TARGET=${{ matrix.config }} \
              bash verif/regress/${{ matrix.testcase }}.sh || rc=$?
          fi

          echo "$rc" > ci-results/exit_code
          find verif/sim -name "iss_regr.log" -exec cp {} ci-results/ \; 2>/dev/null || true
          exit $rc

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier2-rv64-${{ matrix.config }}-${{ matrix.testcase }}
          path: |
            ci-results/
            verif/sim/out*/
          retention-days: 14

  # ============================================================
  # Stage 4: Daily Regression Report
  # ============================================================
  tier2-report:
    name: Tier 2 Daily Report
    runs-on: ubuntu-latest
    needs: [execute-rv32-tier2, execute-rv64-tier2]
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate report
        run: |
          echo "## CVA6 Tier 2 Daily Regression — $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          any_failure=0
          for dir in artifacts/tier2-*/; do
            [ ! -d "$dir" ] && continue
            name=$(basename "$dir")
            exit_code_file="$dir/ci-results/exit_code"
            if [ -f "$exit_code_file" ]; then
              ec=$(cat "$exit_code_file" | tr -d '[:space:]')
            else
              ec="missing"
            fi
            if [ "$ec" = "0" ]; then
              status="✅ PASS"
            elif [ "$ec" = "missing" ]; then
              status="⚠️ No result"; any_failure=1
            else
              status="❌ FAIL (exit $ec)"; any_failure=1
            fi
            echo "| \`$name\` | $status |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$any_failure" -eq 0 ]; then
            echo "**Overall: ✅ ALL PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Overall: ❌ FAILURES DETECTED** — see table above" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*OpenHW CVA6 CI — Tier 2 Daily Verilator Regression*" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any test failed
        run: |
          any_failed=0
          for dir in artifacts/tier2-*/; do
            [ ! -d "$dir" ] && continue
            exit_code_file="$dir/ci-results/exit_code"
            if [ -f "$exit_code_file" ]; then
              ec=$(cat "$exit_code_file" | tr -d '[:space:]')
              if [ "$ec" != "0" ]; then
                echo "::error::Failed: $(basename "$dir") (exit $ec)"
                any_failed=1
              fi
            else
              echo "::error::Missing result: $(basename "$dir")"
              any_failed=1
            fi
          done
          [ "$any_failed" -eq 0 ] && echo "All Tier 2 tests passed."
          exit $any_failed
