# CVA6 Legacy Dashboard Preview
#
# Manual-only artifact build for the legacy dashboard. The deployable
# Pages site is now assembled by the tier dashboard workflow so that
# legacy and tier views can coexist under a single Pages site.

name: openhw-dashboard-legacy-preview

on:
  workflow_dispatch:

# Queue runs instead of cancelling — prevents write conflicts on gh-pages
concurrency:
  group: dashboard-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ============================================================
  # Job 1: Build the dashboard
  # ============================================================
  build:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore history data from gh-pages
        run: |
          mkdir -p /tmp/dash-data
          # Try to fetch data/ from gh-pages branch
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch origin gh-pages --depth=1
            git checkout origin/gh-pages -- data/ 2>/dev/null && \
              cp -r data/* /tmp/dash-data/ 2>/dev/null || \
              echo "No existing data on gh-pages, starting fresh"
          else
            echo "gh-pages branch does not exist yet, starting fresh"
          fi

      - name: Collect CI data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/dashboard/collect_data.py \
            --repo "${{ github.repository }}" \
            --data-dir /tmp/dash-data \
            --fetch-count 10

      - name: Install Jinja2
        run: pip install jinja2

      - name: Generate dashboard HTML
        run: |
          python3 .github/scripts/dashboard/generate_dashboard.py \
            --data-dir /tmp/dash-data \
            --output-dir /tmp/dash-site \
            --repo "${{ github.repository }}"

      - name: Prepare Pages artifact
        run: |
          # Copy data alongside HTML for persistence
          cp -r /tmp/dash-data /tmp/dash-site/data

      - name: Upload legacy dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: cva6-legacy-dashboard-site
          path: /tmp/dash-site
          retention-days: 14
