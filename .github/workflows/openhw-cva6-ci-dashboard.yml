name: openhw-cva6-ci-dashboard

on:
  workflow_run:
    workflows:
      - openhw-cva6-ci-tier1
      - openhw-cva6-ci-tier2
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'

concurrency:
  group: openhw-cva6-ci-dashboard
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore history data from gh-pages-cva6-ci
        run: |
          mkdir -p /tmp/dash-data
          if git ls-remote --heads origin gh-pages-cva6-ci | grep -q gh-pages-cva6-ci; then
            git fetch origin gh-pages-cva6-ci --depth=1
            git checkout origin/gh-pages-cva6-ci -- data/ 2>/dev/null && \
              cp -r data/* /tmp/dash-data/ 2>/dev/null || \
              echo "No existing data on gh-pages-cva6-ci, starting fresh"
          else
            echo "gh-pages-cva6-ci branch does not exist yet, starting fresh"
          fi

      - name: Collect CI data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/dashboard/collect_data.py \
            --repo "${{ github.repository }}" \
            --data-dir /tmp/dash-data \
            --fetch-count 10

      - name: Install Jinja2
        run: pip install jinja2

      - name: Generate dashboard HTML
        run: |
          python3 .github/scripts/dashboard/generate_dashboard.py \
            --data-dir /tmp/dash-data \
            --output-dir /tmp/dash-site \
            --repo "${{ github.repository }}"

      - name: Prepare Pages artifact
        run: cp -r /tmp/dash-data /tmp/dash-site/data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/dash-site

      - name: Upload data for persistence job
        uses: actions/upload-artifact@v4
        with:
          name: cva6-ci-dashboard-data
          path: /tmp/dash-data/
          retention-days: 7

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  persist-data:
    name: Persist Data
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages-cva6-ci branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages-cva6-ci
          fetch-depth: 1
        continue-on-error: true

      - name: Initialize gh-pages-cva6-ci branch if needed
        run: |
          if [ ! -d ".git" ]; then
            git init
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
            git checkout --orphan gh-pages-cva6-ci
            echo "# CVA6 CI Dashboard Data" > README.md
            git add README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Initialize gh-pages-cva6-ci branch"
          fi

      - name: Download updated data
        uses: actions/download-artifact@v4
        with:
          name: cva6-ci-dashboard-data
          path: data/

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update cva6-ci dashboard data [skip ci]"
            git push origin gh-pages-cva6-ci
          fi
