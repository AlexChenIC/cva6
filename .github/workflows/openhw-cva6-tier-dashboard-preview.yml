name: openhw-cva6-tier-dashboard

on:
  workflow_run:
    workflows:
      - ci
      - openhw-apu-full
      - openhw-quick-regress
      - openhw-cva6-ci-tier1
      - openhw-cva6-ci-tier2
    types:
      - completed
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'

concurrency:
  group: openhw-cva6-tier-dashboard-preview
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build Tier Dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore legacy dashboard history from gh-pages
        run: |
          mkdir -p /tmp/legacy-data
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git fetch origin gh-pages --depth=1
            git checkout origin/gh-pages -- data/ 2>/dev/null && \
              cp -r data/* /tmp/legacy-data/ 2>/dev/null || \
              echo "No existing data on gh-pages, starting fresh"
          else
            echo "gh-pages branch does not exist yet, starting fresh"
          fi

      - name: Restore tier dashboard history from gh-pages-cva6-tier-dashboard-data
        run: |
          mkdir -p /tmp/tier-data
          if git ls-remote --heads origin gh-pages-cva6-tier-dashboard-data | grep -q gh-pages-cva6-tier-dashboard-data; then
            git fetch origin gh-pages-cva6-tier-dashboard-data --depth=1
            git checkout origin/gh-pages-cva6-tier-dashboard-data -- data/ 2>/dev/null && \
              cp -r data/* /tmp/tier-data/ 2>/dev/null || \
              echo "No existing data on gh-pages-cva6-tier-dashboard-data, starting fresh"
          else
            echo "gh-pages-cva6-tier-dashboard-data branch does not exist yet, starting fresh"
          fi

      - name: Collect legacy dashboard CI data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/dashboard/collect_data.py \
            --repo "${{ github.repository }}" \
            --data-dir /tmp/legacy-data \
            --fetch-count 10

      - name: Collect tier dashboard CI data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/dashboard_tiers/collect_data.py \
            --repo "${{ github.repository }}" \
            --data-dir /tmp/tier-data \
            --fetch-count 20

      - name: Install Jinja2
        run: pip install jinja2

      - name: Generate legacy dashboard HTML
        run: |
          python3 .github/scripts/dashboard/generate_dashboard.py \
            --data-dir /tmp/legacy-data \
            --output-dir /tmp/dash-site \
            --repo "${{ github.repository }}"

      - name: Generate tier dashboard HTML
        run: |
          mkdir -p /tmp/dash-site/tier
          python3 .github/scripts/dashboard_tiers/generate_dashboard.py \
            --data-dir /tmp/tier-data \
            --output-dir /tmp/dash-site/tier \
            --repo "${{ github.repository }}"

      - name: Prepare Pages artifact
        run: |
          cp -r /tmp/legacy-data /tmp/dash-site/data
          cp -r /tmp/tier-data /tmp/dash-site/tier/data
          cat > /tmp/dash-site/tier.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=./tier/">
              <meta charset="utf-8">
              <title>Redirecting to Tier Dashboard</title>
            </head>
            <body>
              <p>Redirecting to <a href="./tier/">Tier Dashboard</a>...</p>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/dash-site

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: cva6-tier-dashboard-site
          path: /tmp/dash-site
          retention-days: 14

      - name: Upload data for persistence job
        uses: actions/upload-artifact@v4
        with:
          name: cva6-tier-dashboard-data
          path: /tmp/tier-data/
          retention-days: 7

      - name: Upload legacy data for persistence job
        uses: actions/upload-artifact@v4
        with:
          name: cva6-legacy-dashboard-data
          path: /tmp/legacy-data/
          retention-days: 7

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  persist-legacy-data:
    name: Persist Legacy Dashboard Data
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            echo "# CVA6 Legacy Dashboard Data" > README.md
            git add README.md
            git commit -m "Initialize gh-pages branch"
          fi

      - name: Download updated legacy data
        uses: actions/download-artifact@v4
        with:
          name: cva6-legacy-dashboard-data
          path: data/

      - name: Commit and push legacy data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update legacy dashboard data [skip ci]"
            git push origin HEAD:gh-pages
          fi

  persist-tier-data:
    name: Persist Tier Dashboard Data
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare gh-pages-cva6-tier-dashboard-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin gh-pages-cva6-tier-dashboard-data >/dev/null 2>&1; then
            git fetch origin gh-pages-cva6-tier-dashboard-data --depth=1
            git checkout -B gh-pages-cva6-tier-dashboard-data origin/gh-pages-cva6-tier-dashboard-data
          else
            git checkout --orphan gh-pages-cva6-tier-dashboard-data
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            echo "# CVA6 Tier Dashboard Data" > README.md
            git add README.md
            git commit -m "Initialize gh-pages-cva6-tier-dashboard-data branch"
          fi

      - name: Download updated tier data
        uses: actions/download-artifact@v4
        with:
          name: cva6-tier-dashboard-data
          path: data/

      - name: Commit and push tier data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Update cva6 tier dashboard data [skip ci]"
            git push origin HEAD:gh-pages-cva6-tier-dashboard-data
          fi
